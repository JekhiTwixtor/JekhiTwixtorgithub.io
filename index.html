<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JekhiEditsTwixtor | Premium 1080p 60FPS Scenepacks</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0a0d14;
            font-family: 'Inter', sans-serif;
        }
        .glow-effect:hover {
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.35);
            border-color: rgba(99, 102, 241, 0.5);
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col">

    <!-- Header / Navigation -->
    <header class="border-b border-gray-900 bg-[#0e111a] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#" class="text-xl md:text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-500">
                JEKHI<span class="text-white font-light">EDITS</span><span class="text-indigo-400 font-extrabold text-sm align-super">TWIXTOR</span>
            </a>
            <nav class="flex gap-6 text-sm font-medium text-gray-400">
                <a href="#" class="hover:text-indigo-400 transition">Home</a>
                <a href="https://www.youtube.com/@jekhieditstwixtor" target="_blank" class="hover:text-indigo-400 transition"><i class="fab fa-youtube"></i> YouTube</a>
                <a href="https://www.instagram.com/jekhi.ae/" target="_blank" class="hover:text-indigo-400 transition"><i class="fab fa-instagram"></i> Instagram</a>
            </nav>
        </div>
    </header>

    <!-- Hero / Search Section -->
    <section class="max-w-4xl mx-auto text-center px-4 py-16 w-full">
        <div class="inline-block bg-indigo-500/10 border border-indigo-500/20 rounded-full px-4 py-1 text-xs font-semibold text-indigo-400 mb-4 tracking-wide uppercase">
            🚀 The Ultimate Editor Vault
        </div>
        <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-4 tracking-tight">
            Free 1080p 60FPS <span class="text-indigo-500">Twixtor</span> Packs
        </h1>
        <p class="text-gray-400 md:text-lg mb-8">Ultra-smooth clips. No watermarks. Perfect for velocity and synchronization edits.</p>
        
        <!-- Search & Sort Controls Wrapper -->
        <div class="flex flex-col sm:flex-row gap-4 max-w-2xl mx-auto items-center justify-center">
            <!-- Search Bar -->
            <div class="relative w-full sm:flex-grow">
                <i class="fas fa-search absolute left-4 top-4 text-gray-500"></i>
                <input type="text" id="searchInput" placeholder="Search your favorite clips..." 
                       class="w-full bg-[#121622] border border-gray-800 rounded-full pl-12 pr-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition shadow-inner">
            </div>
            
            <!-- Sort Dropdown -->
            <div class="relative w-full sm:w-48 shrink-0">
                <select id="sortSelect" class="w-full bg-[#121622] border border-gray-800 rounded-full pl-4 pr-10 py-3 text-sm text-gray-300 focus:outline-none focus:border-indigo-500 transition cursor-pointer">
                    <option value="default">Sort By: Default</option>
                    <option value="recent">Newest Uploads</option>
                    <option value="size-asc">Size: Small to Large</option>
                    <option value="size-desc">Size: Large to Small</option>
                </select>
            </div>
        </div>
    </section>

    <!-- Filter Categories System -->
    <div class="max-w-4xl mx-auto px-4 mb-12 flex flex-col gap-4 items-center">
        <!-- Main Formats Row -->
        <div class="flex flex-wrap justify-center gap-2.5">
            <button onclick="filterCategory('all', this)" class="cat-btn px-4 py-1.5 rounded-full text-xs md:text-sm font-semibold bg-indigo-600 text-white transition">Home</button>
            <button onclick="filterCategory('twixtor', this)" class="cat-btn px-4 py-1.5 rounded-full text-xs md:text-sm font-semibold bg-[#121622] text-gray-400 hover:bg-gray-800 transition">Twixtor Clips</button>
            <button onclick="filterCategory('raw', this)" class="cat-btn px-4 py-1.5 rounded-full text-xs md:text-sm font-semibold bg-[#121622] text-gray-400 hover:bg-gray-800 transition">Raw Clips</button>
        </div>
        
        <!-- Anime Specific Tags Row -->
        <div class="flex flex-wrap justify-center gap-2.5 border-t border-gray-900/50 pt-3 w-full">
            <span class="text-xs text-gray-600 uppercase tracking-widest font-bold self-center mr-2">Anime:</span>
            <button onclick="filterCategory('demon-slayer', this)" class="cat-btn px-4 py-1.5 rounded-full text-xs font-medium bg-[#121622] text-gray-400 hover:bg-gray-800 transition">Demon Slayer</button>
            <button onclick="filterCategory('jjk', this)" class="cat-btn px-4 py-1.5 rounded-full text-xs font-medium bg-[#121622] text-gray-400 hover:bg-gray-800 transition">Jujutsu Kaisen</button>
            <button onclick="filterCategory('naruto', this)" class="cat-btn px-4 py-1.5 rounded-full text-xs font-medium bg-[#121622] text-gray-400 hover:bg-gray-800 transition">Naruto</button>
            <button onclick="filterCategory('wind-breaker', this)" class="cat-btn px-4 py-1.5 rounded-full text-xs font-medium bg-[#121622] text-gray-400 hover:bg-gray-800 transition">Wind Breaker</button>
        </div>
    </div>

    <!-- Main Content: Clip Grid Wrapper -->
    <main id="clipGrid" class="max-w-7xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 w-full">
        <!-- JavaScript injection point -->
    </main>

    <!-- Load More Pagination Controls Section -->
    <div class="w-full flex justify-center pt-8 pb-24">
        <button id="loadMoreBtn" onclick="loadMoreClips()" class="bg-[#121622] hover:bg-indigo-600 border border-gray-800 hover:border-indigo-500 text-gray-300 hover:text-white font-bold py-3 px-8 rounded-full shadow-lg transition duration-300 flex items-center gap-2">
            <span>Show More Packs</span> <i class="fas fa-chevron-down text-xs"></i>
        </button>
    </div>

    <!-- Footer -->
    <footer class="border-t border-gray-900 bg-[#0e111a] text-center py-6 text-xs text-gray-500 mt-auto">
        <p>&copy; 2026 JekhiEditsTwixtor. All rights reserved. Built for the editing community.</p>
    </footer>

    <!-- JavaScript Data Engine -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === 'jekhi';

        // ==========================================
        // 1. VIDEO ARCHIVE DATABASE
        // ==========================================
        const videoDatabase = [
            {
                title: "Umemiya Twixtor Clips For Editing (Wind Breaker)",
                searchTerms: "umemiya twixtor clips for editing wind breaker anime pack jekhi edits",
                category: "twixtor wind-breaker", // Assigned system data class to match filter button identity rule
                badgeLeft: { text: "Twixtor", style: "text-indigo-400 bg-indigo-500/10" },
                badgeRight: { text: "Wind Breaker", style: "text-amber-400 bg-amber-500/10" },
                specs: "1080p • 60fps • Twixtor Ready",
                date: "2026-05-18T08:20:00", 
                displayDate: "May 18, 2026 at 08:20 AM", 
                size: 95, 
                views: "600", 
                youtubeId: "c_fyUHUlo8Y", 
                driveUrl: "https://drive.google.com/file/d/15kR5EoETswrl_maync7Gc9-Qt-dHFNy_/view"
            },
            {
                title: "Shinobu Kocho Twixtor Clips Season 4 Episode 1",
                searchTerms: "shinobu kocho twixtor clips season 4 episode 1 demon slayer anime pack jekhi edits",
                category: "twixtor demon-slayer",
                badgeLeft: { text: "Twixtor", style: "text-indigo-400 bg-indigo-500/10" },
                badgeRight: { text: "Demon Slayer", style: "text-rose-400 bg-rose-500/10" },
                specs: "1080p • 60fps • Twixtor Ready",
                date: "2026-05-18T08:15:00", 
                displayDate: "May 18, 2026 at 08:15 AM", 
                size: 90, 
                views: "1.2K", 
                youtubeId: "5M8lPS9YDrw", 
                driveUrl: "https://drive.google.com/file/d/1y4NdgQNkqXXcyL0ZGUbRoexH8OHmCfr9/view?usp=sharing"
            },
            {
                title: "Obanai Iguro & Sanemi Shinazugawa (Ep 1)",
                searchTerms: "demon slayer obanai iguro sanemi shinazugawa hashira anime pack twixtor ep 1",
                category: "twixtor demon-slayer",
                badgeLeft: { text: "Twixtor", style: "text-indigo-400 bg-indigo-500/10" },
                badgeRight: { text: "Demon Slayer", style: "text-rose-400 bg-rose-500/10" },
                specs: "1080p • 60fps • Twixtor Ready",
                date: "2026-05-18T07:55:00", 
                displayDate: "May 18, 2026 at 07:55 AM", 
                size: 70, 
                views: "14.2K", 
                youtubeId: "yZNhFXHgdVE",
                driveUrl: "https://drive.google.com/file/d/1g6TYS85yannzi3M7mh7tRgaFCdI-jOL0/view"
            }
        ];

        videoDatabase.forEach((video, index) => video.defaultIndex = index);

        // ==========================================
        // 2. CORE RENDERING ENGINE & STATE CONTROL
        // ==========================================
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const clipGrid = document.getElementById('clipGrid');
        const loadMoreBtn = document.getElementById('loadMoreBtn');

        const CLIPS_PER_PAGE = 12; 
        let visibleCount = CLIPS_PER_PAGE;
        let currentCategory = 'all';
        let searchQuery = '';
        let activePool = [...videoDatabase];

        function createCardHtml(video) {
            const viewsElement = isAdmin ? `<span class="text-[11px] text-indigo-400 font-semibold bg-indigo-500/10 px-2 py-0.5 rounded flex items-center gap-1"><i class="fas fa-eye text-[10px]"></i> ${video.views} Views</span>` : '';

            return `
                <div class="clip-card bg-[#121622] border border-gray-800/60 rounded-2xl overflow-hidden transition duration-300 glow-effect">
                    <div class="aspect-video bg-gray-900 relative">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/${video.youtubeId}" title="Clip Preview" frameborder="0" allow="encrypted-media" allowfullscreen loading="lazy"></iframe>
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-center w-full">
                            <div class="flex gap-2">
                                <span class="text-[10px] font-bold uppercase tracking-wider ${video.badgeLeft.style} px-2 py-0.5 rounded">${video.badgeLeft.text}</span>
                                <span class="text-[10px] font-bold uppercase tracking-wider ${video.badgeRight.style} px-2 py-0.5 rounded">${video.badgeRight.text}</span>
                            </div>
                            ${viewsElement}
                        </div>
                        <h3 class="text-xl font-bold text-white mt-3">${video.title}</h3>
                        <p class="text-xs text-gray-400 mt-1">${video.specs}</p>
                        <p class="text-[11px] text-gray-500 mt-1.5 flex items-center gap-1">
                            <i class="far fa-clock"></i> Uploaded: ${video.displayDate}
                        </p>
                        <a href="${video.driveUrl}" target="_blank" class="mt-5 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl flex justify-center items-center gap-2 transition">
                            <i class="fas fa-download"></i> Download Clip
                        </a>
                    </div>
                </div>
            `;
        }

        function filterAndSortRegistry() {
            activePool = videoDatabase.filter(video => {
                const matchesSearch = video.searchTerms.toLowerCase().includes(searchQuery);
                const categoriesList = video.category.split(' ');
                const matchesCategory = (currentCategory === 'all' || categoriesList.includes(currentCategory));
                return matchesSearch && matchesCategory;
            });

            const sortBy = sortSelect.value;
            if (sortBy === 'recent') {
                activePool.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if (sortBy === 'size-asc') {
                activePool.sort((a, b) => a.size - b.size);
            } else if (sortBy === 'size-desc') {
                activePool.sort((a, b) => b.size - a.size);
            } else {
                activePool.sort((a, b) => a.defaultIndex - b.defaultIndex);
            }

            visibleCount = CLIPS_PER_PAGE;
            renderGrid();
        }

        function renderGrid() {
            clipGrid.innerHTML = '';
            const sliceToRender = activePool.slice(0, visibleCount);

            if (sliceToRender.length === 0) {
                clipGrid.innerHTML = `<div class="col-span-full text-center text-gray-500 py-12">No matching scenepacks found.</div>`;
                loadMoreBtn.style.display = 'none';
                return;
            }

            sliceToRender.forEach(video => {
                clipGrid.insertAdjacentHTML('beforeend', createCardHtml(video));
            });

            if (visibleCount >= activePool.length) {
                loadMoreBtn.style.display = 'none';
            } else {
                loadMoreBtn.style.display = 'flex';
            }
        }

        function loadMoreClips() {
            visibleCount += CLIPS_PER_PAGE;
            renderGrid();
        }

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase().trim();
            filterAndSortRegistry();
        });

        sortSelect.addEventListener('change', filterAndSortRegistry);

        function filterCategory(category, element) {
            currentCategory = category;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-[#121622]', 'text-gray-400');
            });
            element.classList.remove('bg-[#121622]', 'text-gray-400');
            element.classList.add('bg-indigo-600', 'text-white');
            
            filterAndSortRegistry();
        }

        filterAndSortRegistry();
    </script>
</body>
</html>
